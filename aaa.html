<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presentación: Estrategia Hídrica Perú 2030</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>

  <body class="bg-slate-200">
    <!-- Global Decorative Element -->
    <div class="bg-mesh"></div>

    <!-- Presentation Shell -->
    <div class="relative w-screen h-screen flex items-center justify-center p-4">
      
      <!-- Top Breadcrumb (Contained) -->
      <div class="breadcrumb" id="breadcrumb" aria-live="polite">
        ANA • PLANEAMIENTO ESTRATÉGICO 2025-2030
      </div>

      <!-- Main Container for Dynamic Slides -->
      <main id="slides-container" class="w-full h-full max-w-[1440px] max-h-[820px] flex items-center justify-center"></main>

      <!-- Global Navigation -->
      <div class="fixed bottom-8 right-8 flex items-center gap-4 z-50">
        <div class="bg-white/80 backdrop-blur-md border border-slate-200 p-1.5 rounded-2xl shadow-2xl flex gap-2">
          <button
            class="nav-btn"
            aria-label="Diapositiva anterior"
            title="Anterior (Flecha Izquierda)"
            onclick="engine.changeSlide(-1)"
          >
            <i data-lucide="chevron-left" class="w-6 h-6"></i>
          </button>
          <button
            class="nav-btn nav-btn-primary flex items-center gap-3 px-8 py-3 rounded-xl font-black tracking-tight"
            aria-label="Siguiente diapositiva"
            title="Siguiente (Derecha / Espacio)"
            onclick="engine.changeSlide(1)"
          >
            <span>SIGUIENTE</span>
            <i data-lucide="chevron-right" class="w-6 h-6"></i>
          </button>
        </div>
      </div>

      <!-- Help Tooltip -->
      <div class="fixed bottom-8 left-8 text-[10px] font-black text-slate-400 bg-white/50 px-3 py-1 rounded-full border border-slate-200 backdrop-blur-sm pointer-events-none">
        [P] MODO PRESENTADOR • [F] PANTALLA COMPLETA
      </div>

    </div>

    <!-- Progress Indicator -->
    <div class="progress-bar-container">
      <div id="progress" class="progress-bar"></div>
    </div>

    <!-- Application Logic -->
    <script src="assets/js/slides_data.js"></script>
    <script src="assets/js/slides.js"></script>
  </body>
</html>
